name: Run Unit Tests for Lab w12

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "HTTPS URL of the repository to clone"
        required: true
      branch:
        description: "Branch to checkout"
        required: true
        default: "main"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone target repository
        run: |
          git clone --branch labw12_01 https://github.com/Axel-Newton/newton_SYSS8-YSYS-TES.git repo

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run tests with coverage
        working-directory: repo/labs/w12/Bookstore
        run: |
          dotnet test
