$kind: http-request
url: "{{app_url}}/login"
method: POST
body:
  type: json
  content: |-
    {
      "username": "{{newCustomer}}",
      "password": "1234"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.collectionVariables.set("access_token",
      pm.response.json().access_token);
    language: text/javascript
order: 1000
